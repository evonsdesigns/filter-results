<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Amazon Brand Filter</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #1a1a2e;
      color: #e0e0e0;
      width: 300px;
      padding: 16px;
    }

    h1 {
      font-size: 15px;
      font-weight: 700;
      color: #ff9900;
      margin-bottom: 4px;
      letter-spacing: 0.3px;
    }

    #status {
      font-size: 11px;
      color: #aaa;
      margin-bottom: 14px;
      min-height: 14px;
    }

    .stat-row {
      background: #16213e;
      border-radius: 8px;
      padding: 10px 14px;
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .stat-label { font-size: 12px; color: #aaa; }

    #count {
      font-size: 26px;
      font-weight: 700;
      color: #ff9900;
    }

    .btn-row {
      display: flex;
      gap: 8px;
      margin-bottom: 14px;
    }

    button {
      flex: 1;
      padding: 8px 10px;
      border: none;
      border-radius: 6px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.15s;
    }

    button:hover { opacity: 0.85; }

    #toggle { background: #0f3460; color: #e0e0e0; }
    #rescan { background: #ff9900; color: #1a1a2e; }

    hr { border: none; border-top: 1px solid #2a2a4a; margin: 12px 0; }

    h2 {
      font-size: 12px;
      font-weight: 600;
      color: #ccc;
      margin-bottom: 8px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    textarea {
      width: 100%;
      height: 52px;
      background: #16213e;
      border: 1px solid #2a2a4a;
      border-radius: 6px;
      color: #e0e0e0;
      font-size: 11px;
      padding: 7px 9px;
      resize: none;
      margin-bottom: 6px;
    }

    textarea::placeholder { color: #555; }

    #save-custom {
      width: 100%;
      background: #0f3460;
      color: #e0e0e0;
      margin-bottom: 10px;
    }

    #custom-list {
      list-style: none;
      max-height: 90px;
      overflow-y: auto;
    }

    #custom-list li {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 3px 6px;
      font-size: 11px;
      border-radius: 4px;
      background: #16213e;
      margin-bottom: 3px;
    }

    #custom-list li button {
      flex: none;
      background: transparent;
      color: #f44;
      font-size: 10px;
      padding: 1px 4px;
      border-radius: 3px;
    }

    .hint {
      font-size: 10px;
      color: #555;
      margin-top: 8px;
      line-height: 1.5;
    }

    .mode-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: #16213e;
      border-radius: 8px;
      padding: 8px 14px;
      margin-bottom: 12px;
    }

    .mode-label { font-size: 12px; color: #aaa; }

    .mode-options { display: flex; gap: 12px; }

    .mode-opt {
      font-size: 12px;
      color: #e0e0e0;
      display: flex;
      align-items: center;
      gap: 4px;
      cursor: pointer;
    }

    .mode-opt input { accent-color: #ff9900; cursor: pointer; }
  </style>
</head>
<body>
  <h1>🛒 Amazon Brand Filter</h1>
  <div id="status">Checking…</div>

  <div class="stat-row">
    <span class="stat-label">Results hidden on this page</span>
    <span id="count">0</span>
  </div>

  <div class="btn-row">
    <button id="toggle">🟢 Filter ON</button>
    <button id="rescan">🔄 Re-scan</button>
  </div>

  <div class="mode-row">
    <span class="mode-label">Action</span>
    <div class="mode-options">
      <label class="mode-opt">
        <input type="radio" name="filterMode" value="hide" /> Hide results
      </label>
      <label class="mode-opt">
        <input type="radio" name="filterMode" value="flag" /> 🚫 Flag only
      </label>
    </div>
  </div>

  <hr />

  <h2>Custom Block List</h2>
  <textarea id="custom-brands" placeholder="Enter brand names, one per line or comma-separated…"></textarea>
  <button id="save-custom">➕ Add to block list</button>
  <ul id="custom-list"></ul>

  <p class="hint">
    The filter automatically detects brands with random all-caps names,
    consonant-heavy strings, Pinyin patterns, repeated syllables, and
    "XYZ Store" seller names.
  </p>

  <script src="filter.js"></script>
</body>
</html>
